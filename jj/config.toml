#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Matthew Rheaume"
email = "mhr@lightspark.com"

[ui]
color = "auto"
editor = "nvim"
pager = ["sh", "-c", "diff-so-fancy | less --tabs=4 -RFX"]
diff-formatter = ":git"
merge-editor = "vimdiff"

[colors]
"diff token" = { underline = false }

[git]
push = "origin"
executable-path = "git"

[remotes.origin]
auto-track-created-bookmarks = "*"

[templates]
git_push_bookmark = '"mhr/push-" ++ change_id.short()'

[aliases]
g = ["util", "exec", "--", "git", "grep", "-n"]
c = ["commit"]
s = ["status"]
rb = ["rebase"]
rbm = ["rebase", "-d", "trunk()"]
l = ["log"]
d = ["diff"]
dh = ["diff", "--from", "@-", "--to", "@"]
dh1 = ["diff", "--from", "@--", "--to", "@"]
dh2 = ["diff", "--from", "@---", "--to", "@"]
dm = ["diff", "--from", "trunk()", "--to", "@"]
b = ["util", "exec", "--", "sh", "-c", "jj bookmark create \"push-$(jj log -r ${1:-@} --no-graph -T 'change_id.short()')\" -r ${1:-@}", "--"]
bl = ["bookmark", "list"]
bm = ["bookmark", "rename"]
bd = ["bookmark", "delete"]
re = ["restore", "--from", "@-", "--to", "@"]

[merge-tools.vimdiff]
program = "nvim"

# Git-only settings kept in ~/.gitconfig:
# - http.postBuffer
# - credential.helper
# - url.ssh://git@github.com/.insteadOf=https://github.com/
# - submodule.recurse
# - interactive.diffFilter and diff-highlight color settings
#
# jj has no staging area, so there is no direct equivalent for `git diff --staged`.
# `jj diff` shows the current working-copy change.
